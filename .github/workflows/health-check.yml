name: API Health Check

on:
  workflow_dispatch:  # Manual trigger

env:
  HEALTH_URL: ${{ secrets.HEALTH_CHECK_URL }}

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check Backend API
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "ℹ️ HEALTH_CHECK_URL no configurada. Saltando health check remoto."
            exit 0
          fi

          echo "🔍 Checking Backend API: $HEALTH_URL"

          if curl -f -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" | grep -q "200"; then
            echo "✅ API is healthy"
          else
            echo "❌ API health check failed"
            exit 1
          fi
      
      - name: Test Login Endpoint
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "ℹ️ HEALTH_CHECK_URL no configurada. Saltando login check remoto."
            exit 0
          fi

          echo "🔐 Testing login endpoint..."
          BASE_URL="${HEALTH_URL%/api/health}"
          
          curl -X POST "$BASE_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email": "test@flyseats.com", "password": "test123"}' \
            -f -s | grep -q "message" && echo "✅ Login endpoint working"
